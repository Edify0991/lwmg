version: 0.2

sonic:
  policy_type: "encoder_decoder"
  control_dt: 0.02
  strict_dim_check: true
  fail_on_missing_key: true

robot:
  embodiment: "unitree_g1_29dof"
  dof_count: 29
  # SONIC policy_parameters.hpp (IsaacLab order)
  joint_order:
    - left_hip_pitch_joint
    - left_hip_roll_joint
    - left_hip_yaw_joint
    - left_knee_joint
    - left_ankle_pitch_joint
    - left_ankle_roll_joint
    - right_hip_pitch_joint
    - right_hip_roll_joint
    - right_hip_yaw_joint
    - right_knee_joint
    - right_ankle_pitch_joint
    - right_ankle_roll_joint
    - waist_yaw_joint
    - waist_roll_joint
    - waist_pitch_joint
    - left_shoulder_pitch_joint
    - left_shoulder_roll_joint
    - left_shoulder_yaw_joint
    - left_elbow_joint
    - left_wrist_roll_joint
    - left_wrist_pitch_joint
    - left_wrist_yaw_joint
    - right_shoulder_pitch_joint
    - right_shoulder_roll_joint
    - right_shoulder_yaw_joint
    - right_elbow_joint
    - right_wrist_roll_joint
    - right_wrist_pitch_joint
    - right_wrist_yaw_joint
  lower_body_joint_indices_mujoco_order_in_isaaclab_index: [0, 3, 6, 9, 13, 17, 1, 4, 7, 10, 14, 18]
  wrist_joint_indices_isaaclab_order_in_isaaclab_index: [23, 24, 25, 26, 27, 28]

frames:
  root_body: "pelvis"
  left_foot_body: "left_ankle_roll_link"
  right_foot_body: "right_ankle_roll_link"
  left_hand_body: "left_wrist_yaw_link"
  right_hand_body: "right_wrist_yaw_link"

paths:
  sonic_obs_config: "${oc.env:SONIC_OBS_CONFIG, ../../thirdparty/GR00T-WholeBodyControl/gear_sonic_deploy/policy/release/observation_config.yaml}"

runtime:
  history_frames: 10
  history_step: 1
  # Keep only SONIC encoder mode 'g1' (mode_id=0) for reference tracking.
  encoder_mode_name: "g1"
  encoder_mode: 0
  enforce_g1_mode: true

# Legacy keys kept for backward compatibility with basic unit-tests/adapters.
mapping:
  q: joint_position
  dq: joint_velocity
  imu_accel: imu_accel
  imu_gyro: imu_gyro
  prev_action: prev_action
  contacts: foot_contacts
  tracking_error_summary: tracking_error
